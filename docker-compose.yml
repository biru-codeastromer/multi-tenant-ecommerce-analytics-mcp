# Local development stand-in for Supabase Postgres.
#
# Pinned to Postgres 16, which is within the range Supabase runs (15-17). The
# features this project leans on. FORCE ROW LEVEL SECURITY, set_config with
# is_local, role-scoped statement_timeout, jsonb_path_ops GIN. Behave
# identically across all three, so the local/production gap is not meaningful
# here. The one real difference is the connection pooler, which does not exist
# locally; tests/isolation.test.ts simulates its backend-reuse behaviour with a
# deliberately single-connection pool instead.
services:
  db:
    image: postgres:16-alpine
    container_name: zyaro_events_db
    environment:
      POSTGRES_USER: zyaro_owner
      POSTGRES_PASSWORD: local_dev_only_password
      POSTGRES_DB: zyaro_events
    ports:
      - "54329:5432"
    command:
      - postgres
      # Mirrors Supabase pooler behaviour closely enough for the isolation tests.
      - -c
      - max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zyaro_owner -d zyaro_events"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - zyaro_pgdata:/var/lib/postgresql/data

volumes:
  zyaro_pgdata:
